<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBCC 控制中心</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SBCC 控制中心</h1>
            <p>实时数据监控</p>
        </header>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">连接中...</span>
        </div>

        <div class="data-card" id="dataCard">
            <div class="data-label">当前数值</div>
            <div class="data-value" id="dataValue">---</div>
            <div class="data-time" id="dataTime">等待数据...</div>
        </div>

        <div class="history">
            <h3>历史记录</h3>
            <div class="history-list" id="historyList">
                <div class="empty-msg">暂无数据</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
